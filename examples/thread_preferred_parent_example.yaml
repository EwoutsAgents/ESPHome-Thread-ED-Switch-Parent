esphome:
  name: thread-preferred-parent-test
  friendly_name: Thread Preferred Parent Test

esp32:
  board: esp32c6
  framework:
    type: esp-idf

logger:

api:

ota:
  platform: esphome

openthread:

external_components:
  - source:
      type: git
      url: https://github.com/EwoutBergsma/ESPHome-Thread-ED-Switch-Parent
      ref: main
    components: [thread_preferred_parent]
    refresh: 0s

thread_preferred_parent:
  id: preferred_parent
  # Choose one, or set dynamically from Home Assistant.
  # parent_rloc: 0x5800
  # parent_extaddr: "00124b0001abcdef"
  max_attempts: 5
  retry_interval: 8s

button:
  - platform: template
    name: "Switch Thread Parent"
    on_press:
      - lambda: |-
          id(preferred_parent).request_switch();

text:
  - platform: template
    name: "Thread Preferred Parent RLOC16"
    id: preferred_parent_rloc16_text
    optimistic: true
    mode: text
    set_action:
      - lambda: |-
          std::string s = x;

          if (s.rfind("0x", 0) == 0 || s.rfind("0X", 0) == 0) {
            s = s.substr(2);
          }

          char *end = nullptr;
          unsigned long value = strtoul(s.c_str(), &end, 16);

          if (*end != '\0' || value > 0xFFFF) {
            ESP_LOGW("thread_preferred_parent", "Invalid RLOC16: %s", x.c_str());
            return;
          }

          id(preferred_parent).set_parent_rloc16(static_cast<uint16_t>(value));
          ESP_LOGI("thread_preferred_parent", "Set preferred parent RLOC16 to 0x%04lx", value);
  - platform: template
    name: "Thread Preferred Parent ExtAddr"
    optimistic: true
    min_length: 0
    max_length: 23
    mode: text
    set_action:
      - lambda: |-
          id(preferred_parent).set_parent_extaddr(x);

