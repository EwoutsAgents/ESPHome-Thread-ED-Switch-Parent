# Copy this file to stock_test_devices.toml and edit the serial ports.
# Keep the same physical ESP32-C6 assigned to each role across reruns.

[devices]
router1 = "/dev/ttyACM0"
child = "/dev/ttyACM1"
router2 = "/dev/ttyACM2"
# Extra ESP32-C6 boards are erased and flashed with empty.yaml before the
# timed sequence starts. One extra board is then selected as the additional
# router after stock_router_2 is flashed. Any other extras remain on empty.yaml.
# unused1 = "/dev/ttyACM3"
# unused2 = "/dev/ttyACM4"

[variant]
# Selects the highest stock router number included in the run.
# 3 includes stock_router_3.yaml.
# 4 includes stock_router_3.yaml and stock_router_4.yaml.
n_routers = 3

[paths]
# These are relative to this TOML file unless absolute.
configs_dir = "configs"
logs_dir = "logs/stock"

[esphome]
# Optional. If omitted or missing, the runner auto-detects:
#   ../.venv/bin/esphome
#   ../venv/bin/esphome
#   ./.venv/bin/esphome
#   ./venv/bin/esphome
#   PATH
# bin = "../.venv/bin/esphome"

# The default is the important measurement behavior:
# compile all firmware first, then use upload-only commands during the timed test.
precompile = true
clean_before_compile = false

# Optional serial upload speed. Leave commented to use ESPHome's default.
# upload_speed = 460800

[timing]
sniffer_lead_in_seconds = 5
after_router1_seconds = 5
after_child_seconds = 10
after_router2_seconds = 90
after_router1_removed_seconds = 180

[sniffer]
# Optional IEEE 802.15.4 sniffer capture command.
# When enabled, the runner starts this before flashing router1, waits for the
# sniffer lead-in above, stops it after the final 300-second wait, and copies
# the resulting .pcapng into logs/stock.
enabled = false
# command = ["ssh", "rpi-802154-sniffer", "~/bin/nrf802154-sniff"]
stop_timeout_seconds = 10
