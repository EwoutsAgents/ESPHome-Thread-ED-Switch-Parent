substitutions:
  # Fixed benchmark profile (keep identical across all scenarios)
  thread_channel: "15"
  thread_pan_id: "0x1234"
  thread_network_key: "0x00112233445566778899aabbccddeeff"
  thread_ext_pan_id: "0x1111222233334444"
  thread_network_name: "OpenClawBench"
  thread_pskc: "0x445566778899aabbccddeeff00112233"
  thread_mesh_local_prefix: "fd11:22::/64"
  target_parent_extaddr: "4645b099670a43ed"
  auto_trigger_switch: "true"
  auto_trigger_delay: "25s"
  batch_precondition_gate: "true"
  batch_precondition_poll_interval: "1s"
  batch_precondition_timeout_ms: "45000"
  batch_precondition_release_delay_ms: "75000ms"

esphome:
  name: thread-child-variant-b-ucast
  friendly_name: Thread Child Variant B Unicast
  on_boot:
    priority: -100
    then:
      - script.execute: variant_b_ucast_trigger_switch

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: UART0

safe_mode:
  disabled: true

network:
  enable_ipv6: true

api:

ota:
  - platform: esphome

openthread:
  device_type: MTD
  channel: ${thread_channel}
  pan_id: ${thread_pan_id}
  network_key: ${thread_network_key}
  ext_pan_id: ${thread_ext_pan_id}
  network_name: "${thread_network_name}"
  pskc: ${thread_pskc}
  mesh_local_prefix: ${thread_mesh_local_prefix}

external_components:
  - source:
      type: local
      path: ../../components
    components: [openthread, thread_preferred_parent]

thread_preferred_parent:
  id: preferred_parent
  parent_extaddr: "${target_parent_extaddr}"
  max_attempts: 3
  retry_interval: 8s
  selected_attach_timeout: 16s
  parent_request_unicast: true
  early_attach_on_target: true
  early_attach_delay: 500ms
  require_selected_parent_hook: true
  log_parent_responses: true

globals:
  - id: variant_b_ucast_switch_requested_once
    type: bool
    restore_value: no
    initial_value: "false"
  - id: variant_b_ucast_initial_parent_checked_once
    type: bool
    restore_value: no
    initial_value: "false"
  - id: variant_b_ucast_precondition_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

script:
  - id: variant_b_ucast_trigger_switch
    mode: single
    then:
      - if:
          condition:
            lambda: 'return ${auto_trigger_switch} && !${batch_precondition_gate};'
          then:
            - delay: ${auto_trigger_delay}
            - if:
                condition:
                  lambda: 'return !id(variant_b_ucast_switch_requested_once);'
                then:
                  - lambda: 'id(variant_b_ucast_switch_requested_once) = true;'
                  - logger.log: "AUTO trigger: pressing Variant B unicast switch button"
                  - button.press: variant_b_ucast_switch_button
  - id: variant_b_ucast_release_then_switch
    mode: restart
    then:
      - delay: ${batch_precondition_release_delay_ms}
      - logger.log: "AUTO release delay elapsed: pressing Variant B unicast switch button"
      - button.press: variant_b_ucast_switch_button

interval:
  - interval: ${batch_precondition_poll_interval}
    then:
      - if:
          condition:
            lambda: 'return ${batch_precondition_gate} && !id(variant_b_ucast_switch_requested_once) && !id(variant_b_ucast_initial_parent_checked_once);'
          then:
            - lambda: |-
                const uint32_t now = millis();
                if (id(variant_b_ucast_precondition_start_ms) == 0) {
                  id(variant_b_ucast_precondition_start_ms) = now;
                }
                const uint32_t elapsed_ms = now - id(variant_b_ucast_precondition_start_ms);
                if (!id(preferred_parent).probe_active() && !id(preferred_parent).probe_completed()) {
                  ESP_LOGI("variant_b", "V_precondition_probe_start elapsed_ms=%lu target=${target_parent_extaddr}",
                           static_cast<unsigned long>(elapsed_ms));
                  id(preferred_parent).start_parent_response_probe();
                  return;
                }

                if (id(preferred_parent).probe_active()) {
                  return;
                }

                const uint32_t responses = id(preferred_parent).probe_parent_response_count();
                const uint32_t target_matches = id(preferred_parent).probe_target_parent_response_count();
                const std::string current_parent = id(preferred_parent).current_parent_extaddr();
                ESP_LOGI("variant_b", "V_precondition_probe_result elapsed_ms=%lu responses=%lu target_matches=%lu",
                         static_cast<unsigned long>(elapsed_ms), static_cast<unsigned long>(responses),
                         static_cast<unsigned long>(target_matches));

                if (responses > 0 && target_matches == 0) {
                  const std::string observed_parent = id(preferred_parent).probe_non_target_extaddr();
                  ESP_LOGI("variant_b", "V_precondition_initial_parent_extaddr=%s", observed_parent.c_str());
                  id(variant_b_ucast_initial_parent_checked_once) = true;
                  id(variant_b_ucast_switch_requested_once) = true;
                  ESP_LOGI("variant_b", "AUTO precondition satisfied: observed non-target Parent Response %s while target ${target_parent_extaddr} stayed absent; waiting ${batch_precondition_release_delay_ms} ms before Variant B unicast switch button", observed_parent.c_str());
                  id(variant_b_ucast_release_then_switch).execute();
                  return;
                }

                if (responses == 0 && !current_parent.empty() && current_parent != "${target_parent_extaddr}") {
                  ESP_LOGI("variant_b", "V_precondition_initial_parent_extaddr=%s", current_parent.c_str());
                  id(variant_b_ucast_initial_parent_checked_once) = true;
                  id(variant_b_ucast_switch_requested_once) = true;
                  ESP_LOGI("variant_b", "AUTO precondition satisfied from current parent %s while target ${target_parent_extaddr} stayed absent; waiting ${batch_precondition_release_delay_ms} ms before Variant B unicast switch button", current_parent.c_str());
                  id(variant_b_ucast_release_then_switch).execute();
                  return;
                }

                if (elapsed_ms >= ${batch_precondition_timeout_ms}) {
                  id(variant_b_ucast_initial_parent_checked_once) = true;
                  if (target_matches > 0) {
                    ESP_LOGI("variant_b", "V_precondition_initial_parent_extaddr=${target_parent_extaddr}");
                    ESP_LOGW("variant_b", "V_precondition_target_still_current=${target_parent_extaddr}");
                  } else {
                    ESP_LOGW("variant_b", "V_precondition_initial_parent_unknown=no_non_target_parent_response");
                  }
                  return;
                }

                id(preferred_parent).start_parent_response_probe();

button:
  - platform: template
    id: variant_b_ucast_switch_button
    name: "Variant B (unicast): Switch parent"
    on_press:
      - lambda: |-
          ESP_LOGI("variant_b", "T0 request; variant=B unicast");
          id(preferred_parent).request_switch();
