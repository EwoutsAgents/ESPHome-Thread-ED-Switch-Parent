substitutions:
  # Fixed benchmark profile (keep identical across all scenarios)
  thread_channel: "15"
  thread_pan_id: "0x1234"
  thread_network_key: "0x00112233445566778899aabbccddeeff"
  thread_ext_pan_id: "0x1111222233334444"
  thread_network_name: "OpenClawBench"
  thread_pskc: "0x445566778899aabbccddeeff00112233"
  thread_mesh_local_prefix: "fd11:22::/64"
  target_parent_extaddr: "da97557943a05aac"
  auto_trigger_switch: "true"
  auto_trigger_delay: "25s"

esphome:
  name: thread-child-variant-b-ucast
  friendly_name: Thread Child Variant B Unicast
  on_boot:
    priority: -100
    then:
      - script.execute: variant_b_ucast_trigger_switch

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: UART0

network:
  enable_ipv6: true

api:

ota:
  - platform: esphome

openthread:
  device_type: MTD
  channel: ${thread_channel}
  pan_id: ${thread_pan_id}
  network_key: ${thread_network_key}
  ext_pan_id: ${thread_ext_pan_id}
  network_name: "${thread_network_name}"
  pskc: ${thread_pskc}
  mesh_local_prefix: ${thread_mesh_local_prefix}

external_components:
  - source:
      type: local
      path: ../../components
    components: [thread_preferred_parent]

thread_preferred_parent:
  id: preferred_parent
  parent_extaddr: "${target_parent_extaddr}"
  max_attempts: 3
  retry_interval: 8s
  selected_attach_timeout: 16s
  parent_request_unicast: true
  early_attach_on_target: true
  early_attach_delay: 500ms
  require_selected_parent_hook: true
  log_parent_responses: true

globals:
  - id: variant_b_ucast_switch_requested_once
    type: bool
    restore_value: no
    initial_value: "false"

script:
  - id: variant_b_ucast_trigger_switch
    mode: single
    then:
      - if:
          condition:
            lambda: 'return ${auto_trigger_switch};'
          then:
            - delay: ${auto_trigger_delay}
            - if:
                condition:
                  lambda: 'return !id(variant_b_ucast_switch_requested_once);'
                then:
                  - lambda: 'id(variant_b_ucast_switch_requested_once) = true;'
                  - logger.log: "AUTO trigger: pressing Variant B unicast switch button"
                  - button.press: variant_b_ucast_switch_button

button:
  - platform: template
    id: variant_b_ucast_switch_button
    name: "Variant B (unicast): Switch parent"
    on_press:
      - lambda: |-
          ESP_LOGI("variant_b", "T0 request; variant=B unicast");
          id(preferred_parent).request_switch();
