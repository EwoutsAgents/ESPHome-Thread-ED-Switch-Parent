substitutions:
  # Fixed benchmark profile (keep identical across all scenarios)
  thread_tlv: "<THREAD_TLV_SHARED_BY_ALL_NODES>"

esphome:
  name: thread-router
  friendly_name: Thread Router

esp32:
  board: esp32c6
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE

api:

ota:
  - platform: esphome

openthread:
  device_type: FTD
  tlv: "${thread_tlv}"

text_sensor:
  - platform: template
    name: "Role hint"
    lambda: |-
      return {"Router/Leader node for parent-switch benchmark"};
    update_interval: 60s
