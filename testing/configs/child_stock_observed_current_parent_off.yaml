substitutions:
  thread_channel: "15"
  thread_pan_id: "0x1234"
  thread_network_key: "0x00112233445566778899aabbccddeeff"
  thread_ext_pan_id: "0x1111222233334444"
  thread_network_name: "OpenClawBench"
  thread_pskc: "0x445566778899aabbccddeeff00112233"
  thread_mesh_local_prefix: "fd11:22::/64"
  target_parent_extaddr: "588c81fffe5db0c4"
  auto_trigger_switch: "true"
  auto_trigger_delay: "15s"
  prepared_to_search_delay: "1s"
  observe_timeout: "45s"
  probe_poll_interval: "1s"
  probe_timeout_ms: "25000"
  probe_retry_interval: "2s"

esphome:
  name: child-stock-observed-cpoff
  friendly_name: Thread Child Stock Observed Current Parent Off
  on_boot:
    priority: -100
    then:
      - script.execute: stock_observed_trigger_switch

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: UART0

network:
  enable_ipv6: true

api:

ota:
  - platform: esphome

openthread:
  device_type: MTD
  channel: ${thread_channel}
  pan_id: ${thread_pan_id}
  network_key: ${thread_network_key}
  ext_pan_id: ${thread_ext_pan_id}
  network_name: "${thread_network_name}"
  pskc: ${thread_pskc}
  mesh_local_prefix: ${thread_mesh_local_prefix}

external_components:
  - source:
      type: local
      path: ../../components
    components: [thread_stock_observer, thread_preferred_parent]

thread_stock_observer:
  id: stock_observer
  target_parent_extaddr: "${target_parent_extaddr}"
  observe_timeout: ${observe_timeout}
  log_parent_responses: true

thread_preferred_parent:
  id: stock_probe_helper
  parent_extaddr: "${target_parent_extaddr}"
  max_attempts: 1
  retry_interval: ${probe_retry_interval}
  selected_attach_timeout: 24s
  parent_request_unicast: false
  early_attach_on_target: false
  early_attach_delay: 500ms
  require_selected_parent_hook: false
  log_parent_responses: false

globals:
  - id: stock_observed_requested_once
    type: bool
    restore_value: no
    initial_value: "false"
  - id: stock_observed_gate_waiting
    type: bool
    restore_value: no
    initial_value: "false"
  - id: stock_observed_waiting_for_target_restore
    type: bool
    restore_value: no
    initial_value: "false"
  - id: stock_observed_gate_started_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

script:
  - id: stock_observed_release_then_start
    mode: restart
    then:
      - delay: ${prepared_to_search_delay}
      - logger.log: "AUTO gate release elapsed: starting current-parent-off stock search"
      - button.press: stock_observed_current_parent_off_start_button

  - id: stock_observed_trigger_switch
    mode: single
    then:
      - if:
          condition:
            lambda: 'return ${auto_trigger_switch};'
          then:
            - delay: ${auto_trigger_delay}
            - if:
                condition:
                  lambda: 'return !id(stock_observed_requested_once);'
                then:
                  - lambda: |-
                      id(stock_observed_requested_once) = true;
                      id(stock_observed_gate_waiting) = true;
                      id(stock_observed_waiting_for_target_restore) = false;
                      id(stock_observed_gate_started_ms) = millis();
                  - logger.log: "AUTO trigger: preparing current-parent-off stock-observed switch sequence and waiting for probe gate"
                  - button.press: stock_observed_current_parent_off_prepare_button

interval:
  - interval: ${probe_poll_interval}
    then:
      - if:
          condition:
            lambda: 'return id(stock_observed_gate_waiting) && !id(stock_observed_waiting_for_target_restore);'
          then:
            - lambda: |-
                const uint32_t elapsed_ms = millis() - id(stock_observed_gate_started_ms);
                const std::string current = id(stock_probe_helper).current_parent_extaddr();
                const std::string observed_parent = id(stock_probe_helper).probe_non_target_extaddr();
                const uint32_t responses = id(stock_probe_helper).probe_parent_response_count();
                const uint32_t target_matches = id(stock_probe_helper).probe_target_parent_response_count();
                const std::string target = "${target_parent_extaddr}";

                if (!id(stock_probe_helper).probe_active() && !id(stock_probe_helper).probe_completed()) {
                  ESP_LOGI("stock_gate", "SG0 probe start elapsed_ms=%lu current=%s target=%s",
                           static_cast<unsigned long>(elapsed_ms), current.c_str(), target.c_str());
                  id(stock_probe_helper).start_parent_response_probe();
                  return;
                }

                if (id(stock_probe_helper).probe_active()) {
                  return;
                }

                ESP_LOGI("stock_gate", "SG1 probe result elapsed_ms=%lu responses=%lu current=%s observed_parent=%s target_matches=%lu",
                         static_cast<unsigned long>(elapsed_ms), static_cast<unsigned long>(responses),
                         current.c_str(), observed_parent.c_str(), static_cast<unsigned long>(target_matches));

                if (!current.empty() && current != target) {
                  if (!observed_parent.empty() && observed_parent != "0000000000000000") {
                    ESP_LOGI("stock_gate", "SG1 observed non-target Parent Response extaddr=%s", observed_parent.c_str());
                    id(stock_observed_waiting_for_target_restore) = true;
                    ESP_LOGI("stock_gate", "SG2 non-target current parent confirmed (%s) with observed non-target Parent Response; waiting for target restoration before release", current.c_str());
                    return;
                  }
                  ESP_LOGI("stock_gate", "SG1 current parent is non-target but no non-target Parent Response observed yet; retrying");
                }

                if (!current.empty() && current == target) {
                  ESP_LOGI("stock_gate", "SG1 retry_current_parent_is_target");
                  if (elapsed_ms >= ${probe_timeout_ms}) {
                    id(stock_observed_gate_waiting) = false;
                    ESP_LOGW("stock_gate", "SG3 probe timeout after %lu ms while current parent stayed target; starting stock search anyway",
                             static_cast<unsigned long>(elapsed_ms));
                    id(stock_observed_release_then_start).execute();
                    return;
                  }
                  id(stock_probe_helper).start_parent_response_probe();
                  return;
                }

                if (current.empty() && elapsed_ms >= ${probe_timeout_ms}) {
                  id(stock_observed_gate_waiting) = false;
                  ESP_LOGW("stock_gate", "SG3 probe timeout after %lu ms with current parent unknown; starting stock search anyway",
                           static_cast<unsigned long>(elapsed_ms));
                  id(stock_observed_release_then_start).execute();
                  return;
                }

                id(stock_probe_helper).start_parent_response_probe();
      - if:
          condition:
            lambda: 'return id(stock_observed_gate_waiting) && id(stock_observed_waiting_for_target_restore);'
          then:
            - lambda: |-
                const uint32_t elapsed_ms = millis() - id(stock_observed_gate_started_ms);
                if (id(stock_probe_helper).probe_active()) {
                  return;
                }

                const uint32_t responses = id(stock_probe_helper).probe_parent_response_count();
                const uint32_t target_matches = id(stock_probe_helper).probe_target_parent_response_count();
                ESP_LOGI("stock_gate", "SG4 restore probe result elapsed_ms=%lu responses=%lu target_matches=%lu",
                         static_cast<unsigned long>(elapsed_ms), static_cast<unsigned long>(responses),
                         static_cast<unsigned long>(target_matches));

                if (target_matches > 0) {
                  id(stock_observed_gate_waiting) = false;
                  id(stock_observed_waiting_for_target_restore) = false;
                  ESP_LOGI("stock_gate", "SG5 target restoration observed; releasing stock search in ${prepared_to_search_delay}");
                  id(stock_observed_release_then_start).execute();
                  return;
                }

                id(stock_probe_helper).start_parent_response_probe();

button:
  - platform: template
    id: stock_observed_current_parent_off_prepare_button
    name: "Stock Observed Current Parent Off: Prepare"
    on_press:
      - lambda: |-
          id(stock_observer).prepare_stock_search();

  - platform: template
    id: stock_observed_current_parent_off_start_button
    name: "Stock Observed Current Parent Off: Start Search"
    on_press:
      - lambda: |-
          id(stock_observer).start_prepared_stock_search();
