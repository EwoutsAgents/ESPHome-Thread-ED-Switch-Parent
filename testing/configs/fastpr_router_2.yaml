esphome:
  name: fastpr-router-2
  friendly_name: fastpr-router-2

esp32:
  variant: esp32c6
  framework:
    type: esp-idf
    log_level: VERBOSE

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

network:
  enable_ipv6: true

openthread:
  device_type: FTD
  channel: 20
  network_name: parent-switch
  network_key: 0xdfd34f0f05cad978ec4e32b0413038ff
  pan_id: 0x8f28
  ext_pan_id: 0xd63e8e3e495ebbc3
  pskc: 0xc23a76e98f1a6483639b1ac1271e2e27
  mesh_local_prefix: fd53:145f:ed22:ad81::/64
  force_dataset: true

external_components:
  - source:
      type: local
      path: ../../components
    components: [thread_fast_unicast_parent_response]

thread_fast_unicast_parent_response:
  enabled: true
