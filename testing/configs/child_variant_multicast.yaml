substitutions:
  # Fixed benchmark profile (keep identical across all scenarios)
  thread_channel: "15"
  thread_pan_id: "0x1234"
  thread_network_key: "0x00112233445566778899aabbccddeeff"
  thread_ext_pan_id: "0x1111222233334444"
  thread_network_name: "OpenClawBench"
  thread_pskc: "0x445566778899aabbccddeeff00112233"
  thread_mesh_local_prefix: "fd11:22::/64"
  target_parent_extaddr: "da97557943a05aac"
  auto_trigger_switch: "true"
  auto_trigger_delay: "25s"
  batch_precondition_gate: "false"
  batch_precondition_poll_interval: "1s"
  batch_precondition_timeout_ms: "45000"
  batch_precondition_release_delay_ms: "8000ms"

esphome:
  name: thread-child-variant-b-mcast
  friendly_name: Thread Child Variant B Multicast
  on_boot:
    priority: -100
    then:
      - script.execute: variant_b_mcast_trigger_switch

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: UART0

network:
  enable_ipv6: true

api:

ota:
  - platform: esphome

openthread:
  device_type: MTD
  channel: ${thread_channel}
  pan_id: ${thread_pan_id}
  network_key: ${thread_network_key}
  ext_pan_id: ${thread_ext_pan_id}
  network_name: "${thread_network_name}"
  pskc: ${thread_pskc}
  mesh_local_prefix: ${thread_mesh_local_prefix}

external_components:
  - source:
      type: local
      path: ../../components
    components: [thread_preferred_parent]

thread_preferred_parent:
  id: preferred_parent
  parent_extaddr: "${target_parent_extaddr}"
  max_attempts: 3
  retry_interval: 8s
  selected_attach_timeout: 16s
  parent_request_unicast: false
  early_attach_on_target: true
  early_attach_delay: 500ms
  require_selected_parent_hook: true
  log_parent_responses: true

globals:
  - id: variant_b_mcast_switch_requested_once
    type: bool
    restore_value: no
    initial_value: "false"
  - id: variant_b_mcast_initial_parent_checked_once
    type: bool
    restore_value: no
    initial_value: "false"
  - id: variant_b_mcast_precondition_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

script:
  - id: variant_b_mcast_trigger_switch
    mode: single
    then:
      - if:
          condition:
            lambda: 'return ${auto_trigger_switch} && !${batch_precondition_gate};'
          then:
            - delay: ${auto_trigger_delay}
            - if:
                condition:
                  lambda: 'return !id(variant_b_mcast_switch_requested_once);'
                then:
                  - lambda: 'id(variant_b_mcast_switch_requested_once) = true;'
                  - logger.log: "AUTO trigger: pressing Variant B multicast switch button"
                  - button.press: variant_b_mcast_switch_button
  - id: variant_b_mcast_release_then_switch
    mode: restart
    then:
      - delay: ${batch_precondition_release_delay_ms}
      - logger.log: "AUTO release delay elapsed: pressing Variant B multicast switch button"
      - button.press: variant_b_mcast_switch_button

interval:
  - interval: ${batch_precondition_poll_interval}
    then:
      - if:
          condition:
            lambda: 'return ${batch_precondition_gate} && !id(variant_b_mcast_switch_requested_once) && !id(variant_b_mcast_initial_parent_checked_once);'
          then:
            - lambda: |-
                const uint32_t now = millis();
                if (id(variant_b_mcast_precondition_start_ms) == 0) {
                  id(variant_b_mcast_precondition_start_ms) = now;
                }
                auto lock = esphome::openthread::InstanceLock::try_acquire(0);
                if (!lock.has_value()) {
                  if ((now - id(variant_b_mcast_precondition_start_ms)) >= ${batch_precondition_timeout_ms}) {
                    id(variant_b_mcast_initial_parent_checked_once) = true;
                    ESP_LOGW("variant_b", "V_precondition_initial_parent_unknown=timeout_waiting_for_lock");
                  }
                  return;
                }
                otRouterInfo parent{};
                if (otThreadGetParentInfo(lock->get_instance(), &parent) != OT_ERROR_NONE) {
                  if ((now - id(variant_b_mcast_precondition_start_ms)) >= ${batch_precondition_timeout_ms}) {
                    id(variant_b_mcast_initial_parent_checked_once) = true;
                    ESP_LOGW("variant_b", "V_precondition_initial_parent_unknown=timeout_waiting_for_parent");
                  }
                  return;
                }
                char current_parent[17];
                snprintf(current_parent, sizeof(current_parent),
                         "%02x%02x%02x%02x%02x%02x%02x%02x",
                         parent.mExtAddress.m8[0], parent.mExtAddress.m8[1],
                         parent.mExtAddress.m8[2], parent.mExtAddress.m8[3],
                         parent.mExtAddress.m8[4], parent.mExtAddress.m8[5],
                         parent.mExtAddress.m8[6], parent.mExtAddress.m8[7]);
                ESP_LOGI("variant_b", "V_precondition_initial_parent_extaddr=%s", current_parent);
                id(variant_b_mcast_initial_parent_checked_once) = true;
                if (strcmp(current_parent, "${target_parent_extaddr}") == 0) {
                  ESP_LOGW("variant_b", "V_precondition_target_still_current=%s", current_parent);
                  return;
                }
                id(variant_b_mcast_switch_requested_once) = true;
                ESP_LOGI("variant_b", "AUTO precondition satisfied: initial parent %s != target ${target_parent_extaddr}; waiting ${batch_precondition_release_delay_ms} ms before Variant B multicast switch button", current_parent);
                id(variant_b_mcast_release_then_switch).execute();

button:
  - platform: template
    id: variant_b_mcast_switch_button
    name: "Variant B (multicast): Switch parent"
    on_press:
      - lambda: |-
          ESP_LOGI("variant_b", "T0 request; variant=B multicast");
          id(preferred_parent).request_switch();
