substitutions:
  # Fixed benchmark profile (keep identical across all scenarios)
  thread_channel: "15"
  thread_pan_id: "0x1234"
  thread_network_key: "0x00112233445566778899aabbccddeeff"
  thread_ext_pan_id: "0x1111222233334444"
  thread_network_name: "OpenClawBench"
  thread_pskc: "0x445566778899aabbccddeeff00112233"
  thread_mesh_local_prefix: "fd11:22::/64"
  auto_trigger_switch: "true"
  auto_trigger_delay: "25s"

esphome:
  name: thread-child-stock
  friendly_name: Thread Child Stock
  on_boot:
    priority: -100
    then:
      - script.execute: stock_trigger_switch

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: UART0

network:
  enable_ipv6: true

api:

ota:
  - platform: esphome

openthread:
  device_type: MTD
  channel: ${thread_channel}
  pan_id: ${thread_pan_id}
  network_key: ${thread_network_key}
  ext_pan_id: ${thread_ext_pan_id}
  network_name: "${thread_network_name}"
  pskc: ${thread_pskc}
  mesh_local_prefix: ${thread_mesh_local_prefix}

globals:
  - id: stock_switch_requested_once
    type: bool
    restore_value: no
    initial_value: "false"

script:
  - id: stock_trigger_switch
    mode: single
    then:
      - if:
          condition:
            lambda: 'return ${auto_trigger_switch};'
          then:
            - delay: ${auto_trigger_delay}
            - if:
                condition:
                  lambda: 'return !id(stock_switch_requested_once);'
                then:
                  - lambda: 'id(stock_switch_requested_once) = true;'
                  - logger.log: "AUTO trigger: pressing stock switch button"
                  - button.press: stock_switch_button

button:
  - platform: template
    id: stock_switch_button
    name: "Stock: Search for better parent"
    on_press:
      - lambda: |-
          using esphome::openthread::InstanceLock;
          auto lock = InstanceLock::try_acquire(0);
          if (!lock.has_value()) {
            ESP_LOGW("stock_switch", "T0 request ignored; could not lock OpenThread instance");
            return;
          }
          otInstance *instance = lock->get_instance();
          ESP_LOGI("stock_switch", "T0 request; calling otThreadSearchForBetterParent()");
          otError err = otThreadSearchForBetterParent(instance);
          ESP_LOGI("stock_switch", "T1 search started; status=%d", static_cast<int>(err));
