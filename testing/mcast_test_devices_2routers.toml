# Multicast parent-switch test config for 2-router batch runs.
# Keep the same physical ESP32-C6 assigned to each role across reruns.

[devices]
router1 = "/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_58:8C:81:5D:B0:C4-if00"
child = "/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_58:8C:81:5D:B0:E0-if00"
router2 = "/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_58:8C:81:5D:B1:54-if00"
unused1 = "/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_58:8C:81:5F:D8:C4-if00"
unused2 = "/dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_58:8C:81:5F:D9:28-if00"

[variant]
name = "mcast"
# Total number of stock router-capable devices included in the run.
# This does not include the child.
#
# n_routers = 2 means:
#   stock_router_1.yaml + stock_router_2.yaml + mcast_child.yaml
#
# n_routers = 3 means:
#   stock_router_1.yaml + stock_router_2.yaml + stock_router_3.yaml + mcast_child.yaml
#
# n_routers = 4 means:
#   stock_router_1.yaml + stock_router_2.yaml + stock_router_3.yaml + stock_router_4.yaml + mcast_child.yaml
n_routers = 2

[paths]
# These are relative to this TOML file unless absolute.
configs_dir = "configs"
logs_dir = "logs/mcast"

[esphome]
# Optional. If omitted or missing, the runner auto-detects:
#   ../.venv/bin/esphome
#   ../venv/bin/esphome
#   ./.venv/bin/esphome
#   ./venv/bin/esphome
#   PATH
# bin = "../.venv/bin/esphome"

# The default is the important measurement behavior:
# compile all firmware first, then use upload-only commands during the timed test.
precompile = true
clean_before_compile = false

# Optional serial upload speed. Leave commented to use ESPHome's default.
# upload_speed = 460800

[timing]
sniffer_lead_in_seconds = 5
router_settling_seconds = 300
child_attach_seconds = 30
after_parent_removed_seconds = 360

[selection]
# Optional deterministic target selection. Leave commented for true random selection.
# random_seed = 12345

[sniffer]
enabled = true
command = ["ssh", "rpi-802154-sniffer", "~/bin/nrf802154-sniff"]
stop_timeout_seconds = 10
